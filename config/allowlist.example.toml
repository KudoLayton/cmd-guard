# cmd-guard allowlist configuration
# Place at ~/.claude/cmd-guard/config.toml (user) or .claude/cmd-guard/config.toml (project)
# Legacy paths (~/.claude/cmd-guard.toml, .claude/cmd-guard.toml) are also supported

# --- Presets ---
# Use presets to bulk-allow common read-only commands.
# Run `cmd-guard --help` to see all available presets.
presets = [
    "bash-readonly",    # bash builtins + coreutils
    "nu-readonly",      # nushell builtins + nu launcher
    "ps-readonly",      # PowerShell read-only cmdlets + pwsh launcher
    "git-readonly",     # git diff, log, status, etc.
    "cargo-readonly",   # cargo metadata, tree, etc.
    "cargo-build",      # cargo build, check, clippy, doc
    "cargo-test",       # cargo test, bench
]

# --- Custom allow rules ---
# These are merged on top of presets (field-level union).

# Simple commands — all arguments allowed
[allow.jq]
[allow.curl]
[allow.rg]
[allow.fd]

# Subcommand-restricted with deny patterns
[allow.git]
deny_pattern = ['push\s.*--force', 'push\s.*-f']

[allow.npm]
sub = ["install", "run", "test", "ci", "ls"]
deny_pattern = ['install\s.*--global', 'install\s.*-g']

# Multi-word subcommands
# [allow.docker]
# sub = ["ps", "images", "logs", "network ls", "volume ls"]
